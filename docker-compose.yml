services:
  netflix-agent:
    build: .
    container_name: netflix-recommendation-agent
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./kb:/app/kb
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
    stdin_open: true
    tty: true
